services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    image: python:3.11-slim
    working_dir: /app
    command: >
      bash -c "pip install uv -q &&
               uv sync --no-dev --frozen &&
               uv run streamlit run src/itops/dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app:ro
    depends_on:
      api:
        condition: service_healthy
